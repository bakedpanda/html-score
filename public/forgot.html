<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Score Bug — Reset Password</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b0d11;
    color: #e2e8f0;
    font-family: system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .box {
    background: #131720;
    border: 1px solid #252b3a;
    border-radius: 10px;
    padding: 36px 32px;
    width: 100%;
    max-width: 360px;
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-align: center;
  }
  .title span { color: #3b82f6; }
  .sub {
    text-align: center;
    color: #64748b;
    font-size: 13px;
    margin-bottom: 28px;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 6px;
  }
  input[type=text], input[type=password] {
    width: 100%;
    background: #1c2130;
    border: 1px solid #252b3a;
    border-radius: 6px;
    color: #e2e8f0;
    padding: 10px 12px;
    font-size: 15px;
    outline: none;
    margin-bottom: 16px;
  }
  input[type=text] { font-family: monospace; letter-spacing: 0.05em; }
  input[type=text]:focus, input[type=password]:focus { border-color: #3b82f6; }
  button {
    width: 100%;
    background: #3b82f6;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 11px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
  }
  button:hover { background: #2563eb; }
  .error {
    background: rgba(230,57,70,0.12);
    border: 1px solid rgba(230,57,70,0.3);
    color: #e63946;
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 13px;
    margin-bottom: 16px;
    text-align: center;
    display: none;
  }
  .error.show { display: block; }
  .back {
    display: block;
    text-align: center;
    margin-top: 18px;
    font-size: 13px;
    color: #64748b;
    text-decoration: none;
  }
  .back:hover { color: #e2e8f0; }
</style>
</head>
<body>
<div class="box">
  <div class="title">Score<span>Bug</span></div>
  <p class="sub">Enter your recovery key to reset your password</p>
  <div class="error" id="err-key">Invalid recovery key or password too short</div>
  <div class="error" id="err-mismatch">Passwords do not match</div>
  <form method="POST" action="/forgot">
    <label>Recovery Key</label>
    <input type="text" name="recoveryKey" autofocus autocomplete="off" placeholder="XXXXXX-XXXXXX-XXXXXX-XXXXXX" spellcheck="false">
    <label>New Password</label>
    <input type="password" name="password" autocomplete="new-password" minlength="6">
    <label>Confirm New Password</label>
    <input type="password" name="confirm" autocomplete="new-password" minlength="6">
    <button type="submit">Reset Password</button>
  </form>
  <a href="/login" class="back">Back to login</a>
</div>
<script>
  const p = new URLSearchParams(location.search);
  if (p.get('error') === '1')        document.getElementById('err-key').classList.add('show');
  if (p.get('error') === 'mismatch') document.getElementById('err-mismatch').classList.add('show');
</script>
</body>
</html>
