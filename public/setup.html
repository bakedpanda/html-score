<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Score Bug — Set Password</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b0d11;
    color: #e2e8f0;
    font-family: system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .box {
    background: #131720;
    border: 1px solid #252b3a;
    border-radius: 10px;
    padding: 36px 32px;
    width: 100%;
    max-width: 360px;
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-align: center;
  }
  .title span { color: #94a3b8; }
  .sub {
    text-align: center;
    color: #64748b;
    font-size: 13px;
    margin-bottom: 28px;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 6px;
  }
  input[type=password] {
    width: 100%;
    background: #1c2130;
    border: 1px solid #252b3a;
    border-radius: 6px;
    color: #e2e8f0;
    padding: 10px 12px;
    font-size: 15px;
    outline: none;
    margin-bottom: 16px;
  }
  input[type=password]:focus { border-color: #94a3b8; }
  button {
    width: 100%;
    background: #94a3b8;
    color: #0c0d0f;
    border: none;
    border-radius: 6px;
    padding: 11px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
  }
  button:hover { background: #b0bfcf; }
  .error {
    background: rgba(230,57,70,0.12);
    border: 1px solid rgba(230,57,70,0.3);
    color: #e63946;
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 13px;
    margin-bottom: 16px;
    text-align: center;
    display: none;
  }
  .error.show { display: block; }
  .hint {
    font-size: 12px;
    color: #475569;
    text-align: center;
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="box">
  <div class="title">Score<span>Bug</span></div>
  <p class="sub">Create an admin password to get started</p>
  <div class="error" id="err-weak">Password must be at least 6 characters</div>
  <div class="error" id="err-mismatch">Passwords do not match</div>
  <form method="POST" action="/setup">
    <label>Password</label>
    <input type="password" name="password" autofocus autocomplete="new-password" minlength="6">
    <label>Confirm Password</label>
    <input type="password" name="confirm" autocomplete="new-password" minlength="6">
    <button type="submit">Set Password</button>
  </form>
  <p class="hint">You will be given a recovery key after setting your password.</p>
</div>
<script>
  const p = new URLSearchParams(location.search);
  if (p.get('error') === 'weak')     document.getElementById('err-weak').classList.add('show');
  if (p.get('error') === 'mismatch') document.getElementById('err-mismatch').classList.add('show');
</script>
</body>
</html>
